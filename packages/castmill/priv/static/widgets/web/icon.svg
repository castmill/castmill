  <ellipse cx="32" cy="32" rx="20" ry="8" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke="#3b82f6" stroke-width="1.5"/>
  
  <!-- Vertical curve (meridian) -->
  <ellipse cx="32" cy="32" rx="8" ry="20" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="32" y1="12" x2="32" y2="52" stroke="#3b82f6" stroke-width="1.5"/>
  
  <!-- Highlight -->
  <path d="M24 18 Q20 24 22 28" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
