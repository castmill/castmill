<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect x="1" y="1" width="30" height="30" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Top-left finder pattern -->
  <rect x="4" y="4" width="8" height="8" fill="#1a1a2e"/>
  <rect x="5" y="5" width="6" height="6" fill="#ffffff"/>
  <rect x="6" y="6" width="4" height="4" fill="#1a1a2e"/>
  
  <!-- Top-right finder pattern -->
  <rect x="20" y="4" width="8" height="8" fill="#1a1a2e"/>
  <rect x="21" y="5" width="6" height="6" fill="#ffffff"/>
  <rect x="22" y="6" width="4" height="4" fill="#1a1a2e"/>
  
  <!-- Bottom-left finder pattern -->
  <rect x="4" y="20" width="8" height="8" fill="#1a1a2e"/>
  <rect x="5" y="21" width="6" height="6" fill="#ffffff"/>
  <rect x="6" y="22" width="4" height="4" fill="#1a1a2e"/>
  
  <!-- Data modules -->
  <rect x="14" y="4" width="2" height="2" fill="#1a1a2e"/>
  <rect x="14" y="14" width="2" height="2" fill="#1a1a2e"/>
  <rect x="4" y="14" width="2" height="2" fill="#1a1a2e"/>
  <rect x="14" y="24" width="2" height="2" fill="#1a1a2e"/>
  <rect x="24" y="14" width="2" height="2" fill="#1a1a2e"/>
  <rect x="20" y="20" width="2" height="2" fill="#1a1a2e"/>
  <rect x="24" y="24" width="2" height="2" fill="#1a1a2e"/>
</svg>
