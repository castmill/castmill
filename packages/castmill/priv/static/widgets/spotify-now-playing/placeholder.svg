<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background gradient to simulate album art -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1DB954;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#191414;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="url(#bgGradient)"/>
  
  <!-- Music note icon -->
  <g transform="translate(90, 70)" fill="#ffffff" opacity="0.8">
    <!-- First note -->
    <ellipse cx="20" cy="120" rx="18" ry="14"/>
    <rect x="35" y="20" width="6" height="100"/>
    
    <!-- Second note -->
    <ellipse cx="80" cy="110" rx="18" ry="14"/>
    <rect x="95" y="10" width="6" height="100"/>
    
    <!-- Connecting beam -->
    <polygon points="35,20 101,10 101,22 35,32"/>
    
    <!-- Second beam -->
    <polygon points="35,40 101,30 101,42 35,52"/>
  </g>
  
  <!-- "No track playing" text placeholder area -->
  <text x="150" y="230" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" opacity="0.6">
    No track playing
  </text>
</svg>
