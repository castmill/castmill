<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="8" fill="#1a1a2e" stroke="#2d2d4a" stroke-width="2"/>
  
  <!-- RSS icon in top-left corner -->
  <g transform="translate(6, 6)">
    <circle cx="3" cy="9" r="2" fill="#e63946"/>
    <path d="M3,1 a8,8 0 0 1 8,8" fill="none" stroke="#e63946" stroke-width="2" stroke-linecap="round"/>
    <path d="M3,1 a14,14 0 0 1 14,14" fill="none" stroke="#e63946" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Main news card -->
  <rect x="8" y="22" width="48" height="36" rx="3" fill="#2d2d4a"/>
  
  <!-- Image placeholder area -->
  <rect x="10" y="24" width="20" height="32" rx="2" fill="#3d3d5c"/>
  <g transform="translate(14, 34)">
    <!-- Image icon -->
    <rect x="0" y="0" width="12" height="12" rx="1" fill="#4d4d6c" stroke="#666680" stroke-width="0.5"/>
    <circle cx="4" cy="4" r="1.5" fill="#666680"/>
    <polygon points="1,10 5,6 8,9 11,5 11,10" fill="#666680"/>
  </g>
  
  <!-- Text lines (title and description) -->
  <rect x="33" y="26" width="20" height="4" rx="1" fill="#ffffff"/>
  <rect x="33" y="33" width="18" height="2" rx="0.5" fill="#808080"/>
  <rect x="33" y="38" width="20" height="2" rx="0.5" fill="#666680" opacity="0.7"/>
  <rect x="33" y="43" width="16" height="2" rx="0.5" fill="#666680" opacity="0.5"/>
  
  <!-- Date badge on image -->
  <rect x="11" y="50" width="14" height="4" rx="1" fill="#e63946"/>
  <rect x="13" y="51.5" width="10" height="1" rx="0.25" fill="#ffffff"/>
  
  <!-- News indicator dots at bottom -->
  <circle cx="26" cy="60" r="1.5" fill="#e63946"/>
  <circle cx="32" cy="60" r="1.5" fill="#4d4d6c"/>
  <circle cx="38" cy="60" r="1.5" fill="#4d4d6c"/>
</svg>
