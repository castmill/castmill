  <rect x="5" y="14" width="2" height="3" rx="0.5" fill="#1a1a2e"/>
  <rect x="5" y="20" width="2" height="3" rx="0.5" fill="#1a1a2e"/>
  <rect x="25" y="8" width="2" height="3" rx="0.5" fill="#1a1a2e"/>
  <rect x="25" y="14" width="2" height="3" rx="0.5" fill="#1a1a2e"/>
  <rect x="25" y="20" width="2" height="3" rx="0.5" fill="#1a1a2e"/>
  
  <!-- Play button -->
  <circle cx="16" cy="16" r="6" fill="#ef4444" opacity="0.9"/>
