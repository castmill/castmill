<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="1" y="1" width="30" height="30" rx="4" fill="#1a1a2e" stroke="#2d2d4a" stroke-width="1"/>
  
  <!-- Sun -->
  <circle cx="22" cy="9" r="5" fill="#fbbf24"/>
  
  <!-- Sun rays -->
  <g stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round">
    <line x1="22" y1="2" x2="22" y2="3"/>
    <line x1="28" y1="5" x2="27" y2="6"/>
    <line x1="29" y1="9" x2="28" y2="9"/>
    <line x1="17" y1="5" x2="18" y2="6"/>
  </g>
  
  <!-- Gray cloud (back) -->
  <g filter="url(#shadow-sm)">
    <ellipse cx="11" cy="18" rx="5" ry="3.5" fill="#64748b"/>
    <ellipse cx="16" cy="17" rx="4" ry="3" fill="#64748b"/>
  </g>
  
  <!-- White cloud (front) -->
  <g filter="url(#shadow-sm)">
    <ellipse cx="18" cy="22" rx="6" ry="4" fill="#e2e8f0"/>
    <ellipse cx="24" cy="21" rx="5" ry="3.5" fill="#f1f5f9"/>
    <ellipse cx="13" cy="23" rx="4" ry="3" fill="#e2e8f0"/>
  </g>
</svg>
