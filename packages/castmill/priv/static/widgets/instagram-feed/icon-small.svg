<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="ig-grad-sm" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f09433;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#e6683c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#dc2743;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#cc2366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc1888;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="1" y="1" width="30" height="30" rx="7" ry="7" fill="url(#ig-grad-sm)"/>
  <!-- Camera outline -->
  <rect x="8" y="8" width="16" height="16" rx="4" ry="4" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- Lens circle -->
  <circle cx="16" cy="16" r="4" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- Viewfinder dot -->
  <circle cx="22" cy="10" r="1.5" fill="#ffffff"/>
</svg>
