// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'
        classpath 'com.google.gms:google-services:4.4.0'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

subprojects { subproject ->
    subproject.afterEvaluate {
        def androidExtension = subproject.extensions.findByName('android')
        if (androidExtension != null && androidExtension.hasProperty('compileOptions')) {
            androidExtension.compileOptions.sourceCompatibility = JavaVersion.VERSION_17
            androidExtension.compileOptions.targetCompatibility = JavaVersion.VERSION_17
        }

        subproject.tasks.withType(JavaCompile).configureEach { javaCompileTask ->
            javaCompileTask.sourceCompatibility = JavaVersion.VERSION_17.toString()
            javaCompileTask.targetCompatibility = JavaVersion.VERSION_17.toString()
            if (javaCompileTask.options.hasProperty('release')) {
                javaCompileTask.options.release.set(17)
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
